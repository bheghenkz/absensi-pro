name: Build Webview APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Android Webview Project
        run: |
          wget https://github.com/twaddington/android-webview-app/archive/refs/heads/master.zip -O app.zip
          unzip app.zip
          mv android-webview-app-master android-webview-app
          cd android-webview-app
          sed -i 's|https://example.com|https://absensi.smilebots.my.id|g' app/src/main/res/values/strings.xml

      - name: Build APK
        run: |
          cd android-webview-app
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: absensi-apk
          path: android-webview-app/app/build/outputs/apk/debug/app-debug.apk
