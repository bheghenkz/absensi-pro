name: Build WebView APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Android Project
        run: |
          git clone https://github.com/twaddington/android-webview-app.git
          cd android-webview-app
          sed -i 's|https://example.com|https://absensi.smilebots.my.id|g' app/src/main/res/values/strings.xml
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: absensi-apk
          path: android-webview-app/app/build/outputs/apk/debug/app-debug.apk
