name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create Android Webview App
        run: |
          mkdir app
          cd app
          curl -L https://github.com/twaddington/android-webview-app/archive/refs/heads/master.zip -o app.zip
          unzip app.zip
          cd android-webview-app-master
          sed -i 's|https://example.com|https://absensi.smilebots.my.id|g' app/src/main/res/values/strings.xml
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: absensi-apk
          path: app/android-webview-app-master/app/build/outputs/apk/debug/app-debug.apk
